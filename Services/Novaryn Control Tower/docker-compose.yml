version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: controltower-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: controltower
      POSTGRES_PASSWORD: controltower
      POSTGRES_DB: controltower
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
